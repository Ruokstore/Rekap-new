<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Login Khusus</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f4; margin: 0; }
        .login-container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        h2 { text-align: center; color: #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        #error-msg { color: red; font-size: 14px; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <p id="error-msg">Username atau Password Salah!</p>
    <button onclick="checkLogin()">Masuk</button>
</div>

<script>
    function checkLogin() {
        const userInput = document.getElementById('username').value;
        const passInput = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');

        // Data login sesuai permintaanmu
        const validUser = "DIRECT BY LEJZZ";
        const validPass = "SFS MOD";
        
        // Link tujuan setelah login berhasil
        const targetLink = "https://www.mediafire.com/file/j8m7ynzm4xievyo/base.apk/file"; // Ganti dengan link tujuanmu

        if (userInput === validUser && passInput === validPass) {
            window.location.href = targetLink;
        } else {
            errorMsg.style.display = 'block';
        }
    }
</script>

</body>
</html>
